<header>
    <div class="header-container">
        <h1><a href="{% url 'home' %}" style="color: white; text-decoration: none;">My eCommerce Store</a></h1>
        <nav style="display: flex; align-items: center; flex-wrap: wrap;">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'product_list' %}">Shop</a>
            {% if request.user.is_authenticated %}
                <a href="{% url 'add_product' %}">Add Product</a>
                <span class="auth-status" style="margin-left: 20px;">Hi, {{ request.user.username }}!</span>
                <form action="{% url 'logout' %}" method="POST" style="display: inline; margin-left: 20px;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: #fff; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 1rem; transition: color 0.2s; padding: 0;" onmouseover="this.style.color='#f0c14b'" onmouseout="this.style.color='#fff'">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Register</a>
            {% endif %}
        </nav>
    </div>
</header>
