
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'base_nav.html' %}
    <div class="container">
        <div class="form-container">
            <h2 style="margin-bottom: 10px;">Sign In</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">Enter your credentials to manage inventory</p>
            
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <br>
                <button type="submit" class="btn btn-block">Login</button>
            </form>
            <div style="text-align: center; margin-top: 20px;">
                <p>Naya account banana hai? <a href="{% url 'signup' %}" style="color: #b12704; font-weight: bold;">Register Here</a></p>
                <br>
                <a href="{% url 'home' %}" style="text-decoration: none; color: #232f3e;">&larr; Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
