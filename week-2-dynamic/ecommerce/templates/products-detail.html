<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .detail-container { display: flex; background: white; padding: 30px; border-radius: 8px; gap: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; }
        .detail-img { flex: 1; text-align: center; }
        .detail-img img { max-width: 100%; height: auto; }
        .detail-info { flex: 1; }
        @media (max-width: 768px) { .detail-container { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <h1>Product Details</h1>
        <nav>
            <a href="{% url 'home' %}">Home</a> | 
            <a href="{% url 'product_list' %}">Shop Products</a>
        </nav>
    </header>
    <div class="container">
        <div class="detail-container">
            <div class="detail-img"><img src="{{ product.image }}" alt="{{ product.name }}"></div>
            <div class="detail-info">
                <h2>{{ product.name }}</h2>
                <p class="price">${{ product.price }}</p>
                <p style="margin-bottom: 20px;">{{ product.description }}</p>
                <a href="{% url 'product_list' %}" class="btn">Back to Shop</a>
            </div>
        </div>
    </div>
</body>
</html>
