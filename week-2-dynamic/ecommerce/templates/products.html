<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Dynamic</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>Our Dynamic Store</h1>
        <nav>
            <a href="{% url 'home' %}">Home</a> | <a href="{% url 'product_list' %}">Shop Products</a>
        </nav>
    </header>

    <div class="container">
        <div style="margin-bottom: 30px; text-align: center;">
            <form action="{% url 'product_list' %}" method="GET">
                <input type="text" name="q" value="{{ query }}" placeholder="Search by name or category..." style="padding: 10px; width: 60%; max-width: 400px; border: 1px solid #ccc; border-radius: 4px;">
                <button type="submit" class="btn" style="padding: 10px 20px; cursor: pointer;">Search</button>
            </form>
        </div>

        <h2>Our Products</h2>
        <div class="product-grid">
            {% for product in products %}
                <div class="product-card">
                    <img src="{{ product.image }}" alt="{{ product.name }}">
                    <h3>{{ product.name }}</h3>
                    <p style="color: gray; font-size: 0.9rem;">Category: {{ product.category }}</p>
                    <p class="price">${{ product.price }}</p>
                    <a href="{% url 'product_detail' product.id %}" class="btn">View Details</a>
                </div>
            {% empty %}
                <p style="text-align: center; grid-column: span 3;">Koi product nahi mila!</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
